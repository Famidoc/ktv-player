<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTV VIP 包廂</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col md:flex-row">

    <div class="flex-1 p-4 flex flex-col">
        <h1 class="text-2xl font-bold text-pink-500 mb-4">🎤 KTV VIP 雲端點歌系統</h1>
        
        <div class="w-full aspect-video bg-black rounded-lg shadow-lg overflow-hidden border border-gray-700">
            <video id="ktv-player" class="w-full h-full" controls autoplay>
                </video>
        </div>
        
        <div class="mt-4 p-4 bg-gray-800 rounded-lg">
             <p class="text-gray-400">目前播放：<span id="now-playing" class="text-white font-bold">尚未點歌</span></p>
        </div>
    </div>

    <div class="w-full md:w-96 bg-gray-800 p-4 flex flex-col border-l border-gray-700 min-h-[50vh] md:min-h-screen">
        <h2 class="text-xl font-bold text-blue-400 mb-4">🎵 雲端歌庫</h2>
        
        <input type="text" id="search-bar" placeholder="搜尋歌名..." class="w-full p-2 mb-4 rounded bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <div id="song-list-container" class="flex-1 overflow-y-auto space-y-2 pr-2">
            <p class="text-gray-400 text-center mt-10" id="loading-text">載入歌單中...</p>
            </div>
    </div>

    <script>
				// 💡 1. 請再次確認這裡的 URL 與您最新部署的 exec 網址一字不差
				const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzRXbdzRcU01ccyb30Df1xOvxloroLAM40KzEVf1u_-Mo2zWpxkGDvVenNK74YsUGjcJw/exec';
				const GOOGLE_API_KEY = 'AIzaSyCFwZ6k1QdZ8J8Pw_tI-I1TnoMhnOGJbPs'; // 請填入您的 API Key

				let allSongs = [];

				// 💡 2. 使用 window.onload 確保 HTML 標籤都長出來了才執行
				window.onload = function() {
						console.log("網頁載入完成，開始抓取歌單...");
						fetchSongList();

						// 綁定搜尋功能
						const searchBar = document.getElementById('search-bar');
						if(searchBar) {
								searchBar.addEventListener('input', (e) => {
										const keyword = e.target.value.toLowerCase();
										const filteredSongs = allSongs.filter(song => song.name.toLowerCase().includes(keyword));
										renderSongList(filteredSongs);
								});
						}
				};

				async function fetchSongList() {
						const loadingEl = document.getElementById('loading-text');
						try {
								// 💡 3. 加入 {redirect: 'follow'} 確保處理 Google 的轉址
								const response = await fetch(GAS_WEB_APP_URL, { redirect: 'follow' });
								
								if (!response.ok) throw new Error('連線失敗: ' + response.status);
								
								allSongs = await response.json();
								renderSongList(allSongs);
								
								if(loadingEl) loadingEl.style.display = 'none'; // 載入成功就隱藏文字
						} catch (error) {
								console.error('詳細錯誤訊息:', error);
								if(loadingEl) loadingEl.innerText = '載入失敗，原因：' + error.message;
						}
				}

				function renderSongList(songs) {
						const container = document.getElementById('song-list-container');
						if(!container) return;
						
						container.innerHTML = ''; 
						if(songs.length === 0) {
								container.innerHTML = '<p class="text-gray-400 text-center mt-10">資料夾內尚無檔案</p>';
								return;
						}

						songs.forEach(song => {
								const btn = document.createElement('button');
								btn.className = 'w-full text-left p-3 bg-gray-700 hover:bg-pink-600 rounded mb-2 transition-colors truncate';
								btn.innerText = song.name;
								btn.onclick = () => playSong(song.id, song.name);
								container.appendChild(btn);
						});
				}

				function playSong(fileId, songName) {
						const player = document.getElementById('ktv-player');
						const nowPlaying = document.getElementById('now-playing');
						const streamUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GOOGLE_API_KEY}`;
						
						player.src = streamUrl;
						if(nowPlaying) nowPlaying.innerText = songName;
						player.play();
				}
		</script>
</body>
</html>
